<!DOCTYPE html>
<html>
<head>
    <title>User Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h3 class="text-center">User Registration</h3>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
        {% endwith %}

        <form method="POST">

            <div class="mb-3">
                <input type="text" name="name" class="form-control" placeholder="Full Name" required>
            </div>

            <div class="mb-3">
                <input type="email" name="email" class="form-control" placeholder="Email" required>
            </div>

            <div class="mb-3 position-relative">
                <input type="password" id="password" name="password" class="form-control" placeholder="Password" required>
                <span onclick="togglePassword()" style="position:absolute; right:10px; top:10px; cursor:pointer;">
                    👁️
                </span>
            </div>

            <div class="mb-3 position-relative">
                <input type="password" id="confirm_password" class="form-control" placeholder="Confirm Password" required>
                <span onclick="toggleConfirmPassword()" style="position:absolute; right:10px; top:10px; cursor:pointer;">
                    👁️
                </span>
            </div>

            <button class="btn btn-success w-100">Register</button>
        </form>

        <p class="mt-3 text-center">
            Already have account? <a href="/user_login">Login</a>
        </p>
    </div>
</div>

<script>
function togglePassword() {
    var x = document.getElementById("password");
    x.type = (x.type === "password") ? "text" : "password";
}

function toggleConfirmPassword() {
    var x = document.getElementById("confirm_password");
    x.type = (x.type === "password") ? "text" : "password";
}

// Password match validation
document.querySelector("form").onsubmit = function() {
    var p = document.getElementById("password").value;
    var cp = document.getElementById("confirm_password").value;

    if (p !== cp) {
        alert("Passwords do not match!");
        return false;
    }
};
</script>

</body>
</html>
