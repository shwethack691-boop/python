<!DOCTYPE html>
<html>
<head>
    <title>Grievance System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="/">Grievance System</a>

        <div>
            <a href="/dashboard" class="text-white me-3">Dashboard</a>
            <a href="/view" class="text-white me-3">View</a>
            <a href="/track" class="text-white me-3">Track</a>
            <a href="/login" class="text-white me-3">Admin</a>
            <a href="/logout" class="text-danger">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, msg in messages %}
            <div class="alert alert-{{category}}">{{msg}}</div>
        {% endfor %}
    {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}

</div>

</body>
</html>
